name: canonicality-rebuild-all

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: canonicality-rebuild-all-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-render-contract:
    name: verify-render-contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify render contract
        run: make verify-render-contract

  rebuild-all:
    name: rebuild-all
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run canonicality proof
        run: make rebuild-all

      - name: Upload canonicality attestation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonicality-attestation-${{ github.run_id }}
          path: |
            prolog/canonicality_attestation.ndjson
            prolog/canonicality_attestation.schema.json
          if-no-files-found: warn
