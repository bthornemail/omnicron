<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Omnicron Render Packet Viewer (WebGL2)</title>
  <style>
    :root {
      --bg: #020617;
      --panel: #0b1220;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #22d3ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 25% 20%, #0b1220 0%, #020617 55%);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #1e293b;
      background: rgba(11, 18, 32, 0.9);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .toolbar input[type="text"] {
      width: min(40rem, 55vw);
      background: #0f172a;
      color: var(--text);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 10px;
    }
    .toolbar button, .toolbar label {
      background: #0f172a;
      color: var(--text);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      user-select: none;
    }
    .toolbar button:hover, .toolbar label:hover {
      border-color: var(--accent);
    }
    .toolbar .muted { color: var(--muted); font-size: 12px; }
    .toolbar input[type="file"] { display: none; }

    .viewport {
      position: relative;
      width: 100%;
      height: calc(100vh - 54px);
      overflow: hidden;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
    }
    .labels {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .label {
      position: absolute;
      font-size: 12px;
      color: var(--muted);
      white-space: pre;
      text-shadow: 0 0 4px rgba(2, 6, 23, 0.9);
      transform: translate(-0%, -100%);
    }
    .status {
      position: absolute;
      left: 12px;
      bottom: 10px;
      padding: 6px 8px;
      border-radius: 6px;
      background: rgba(2, 6, 23, 0.75);
      color: var(--muted);
      font-size: 12px;
      border: 1px solid #1e293b;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <label>
      Load NDJSON
      <input id="fileInput" type="file" accept=".ndjson,.json,.txt,application/x-ndjson,application/json,text/plain" />
    </label>
    <input id="urlInput" type="text" placeholder="packet URL (e.g. ./render_packet.ndjson)" />
    <button id="loadUrlBtn" type="button">Load URL</button>
    <button id="resetViewBtn" type="button">Reset View</button>
    <span class="muted">Drag to pan · wheel to zoom</span>
  </div>

  <div class="viewport">
    <canvas id="glCanvas"></canvas>
    <div id="labels" class="labels"></div>
    <div id="status" class="status">No packet loaded</div>
  </div>

  <script>
    const canvas = document.getElementById("glCanvas");
    const labelsLayer = document.getElementById("labels");
    const statusEl = document.getElementById("status");
    const fileInput = document.getElementById("fileInput");
    const urlInput = document.getElementById("urlInput");
    const loadUrlBtn = document.getElementById("loadUrlBtn");
    const resetViewBtn = document.getElementById("resetViewBtn");

    /** @type {WebGL2RenderingContext} */
    const gl = canvas.getContext("webgl2", { antialias: true, alpha: true });
    if (!gl) {
      statusEl.textContent = "WebGL2 not available in this browser";
      throw new Error("WebGL2 unavailable");
    }

    const VS = `#version 300 es
      precision highp float;
      layout(location=0) in vec2 aPos;
      layout(location=1) in vec4 aColor;
      uniform vec2 uViewport;
      uniform vec2 uPan;
      uniform float uZoom;
      out vec4 vColor;
      void main() {
        vec2 p = (aPos + uPan) * uZoom;
        vec2 ndc = vec2((p.x / uViewport.x) * 2.0 - 1.0, 1.0 - (p.y / uViewport.y) * 2.0);
        gl_Position = vec4(ndc, 0.0, 1.0);
        vColor = aColor;
      }`;

    const FS = `#version 300 es
      precision highp float;
      in vec4 vColor;
      out vec4 outColor;
      void main() { outColor = vColor; }`;

    function compile(type, src) {
      const sh = gl.createShader(type);
      gl.shaderSource(sh, src);
      gl.compileShader(sh);
      if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(sh) || "shader compile failed");
      }
      return sh;
    }

    function link(vs, fs) {
      const prog = gl.createProgram();
      gl.attachShader(prog, vs);
      gl.attachShader(prog, fs);
      gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
        throw new Error(gl.getProgramInfoLog(prog) || "program link failed");
      }
      return prog;
    }

    const prog = link(compile(gl.VERTEX_SHADER, VS), compile(gl.FRAGMENT_SHADER, FS));
    gl.useProgram(prog);

    const uViewport = gl.getUniformLocation(prog, "uViewport");
    const uPan = gl.getUniformLocation(prog, "uPan");
    const uZoom = gl.getUniformLocation(prog, "uZoom");

    const vao = gl.createVertexArray();
    const vbo = gl.createBuffer();
    const ebo = gl.createBuffer();

    let packet = null;
    let indexCount = 0;
    let panX = 0;
    let panY = 0;
    let zoom = 1;

    function toObjFromNDJSON(text) {
      const line = text.split(/\r?\n/).find((l) => l.trim().length > 0);
      if (!line) throw new Error("empty NDJSON");
      return JSON.parse(line);
    }

    function setPacket(rec) {
      if (!rec || rec.type !== "render_packet") throw new Error("record is not render_packet");

      packet = rec;
      indexCount = rec.indices.length;

      const vertexCount = rec.positions.length / 2;
      const interleaved = new Float32Array(vertexCount * 6);
      for (let i = 0; i < vertexCount; i++) {
        interleaved[i * 6 + 0] = rec.positions[i * 2 + 0];
        interleaved[i * 6 + 1] = rec.positions[i * 2 + 1];
        interleaved[i * 6 + 2] = rec.colors[i * 4 + 0];
        interleaved[i * 6 + 3] = rec.colors[i * 4 + 1];
        interleaved[i * 6 + 4] = rec.colors[i * 4 + 2];
        interleaved[i * 6 + 5] = rec.colors[i * 4 + 3];
      }

      gl.bindVertexArray(vao);
      gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
      gl.bufferData(gl.ARRAY_BUFFER, interleaved, gl.STATIC_DRAW);
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ebo);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint32Array(rec.indices), gl.STATIC_DRAW);
      gl.enableVertexAttribArray(0);
      gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 6 * 4, 0);
      gl.enableVertexAttribArray(1);
      gl.vertexAttribPointer(1, 4, gl.FLOAT, false, 6 * 4, 2 * 4);
      gl.bindVertexArray(null);

      resetView();
      statusEl.textContent = `frame=${rec.frame_id} cells=${rec.width}x${rec.height} indices=${indexCount}`;
      renderLabels();
      requestAnimationFrame(draw);
    }

    function resetView() {
      if (!packet) return;
      const targetW = packet.width * packet.cell_size;
      const targetH = packet.height * packet.cell_size;
      const sx = canvas.width / Math.max(1, targetW);
      const sy = canvas.height / Math.max(1, targetH);
      zoom = Math.min(sx, sy) * 0.92;
      panX = ((canvas.width / zoom) - targetW) * 0.5;
      panY = ((canvas.height / zoom) - targetH) * 0.5;
      renderLabels();
      requestAnimationFrame(draw);
    }

    function draw() {
      if (!packet) return;
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.clearColor(0.01, 0.02, 0.06, 1);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.useProgram(prog);
      gl.uniform2f(uViewport, canvas.width, canvas.height);
      gl.uniform2f(uPan, panX, panY);
      gl.uniform1f(uZoom, zoom);
      gl.bindVertexArray(vao);
      gl.drawElements(gl.TRIANGLES, indexCount, gl.UNSIGNED_INT, 0);
      gl.bindVertexArray(null);
    }

    function renderLabels() {
      labelsLayer.innerHTML = "";
      if (!packet || !packet.overlay_flags?.show_labels) return;
      for (const l of packet.labels || []) {
        const el = document.createElement("div");
        el.className = "label";
        el.textContent = l.text || "";
        const x = (l.x + panX) * zoom;
        const y = (l.y + panY) * zoom;
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        if (l.fill) el.style.color = l.fill;
        labelsLayer.appendChild(el);
      }
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(1, Math.floor(canvas.clientWidth * dpr));
      const h = Math.max(1, Math.floor(canvas.clientHeight * dpr));
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
        renderLabels();
        requestAnimationFrame(draw);
      }
    }
    new ResizeObserver(resize).observe(canvas);
    resize();

    let dragging = false;
    let lastX = 0;
    let lastY = 0;

    canvas.addEventListener("mousedown", (ev) => {
      dragging = true;
      lastX = ev.clientX;
      lastY = ev.clientY;
    });
    window.addEventListener("mouseup", () => { dragging = false; });
    window.addEventListener("mousemove", (ev) => {
      if (!dragging || !packet) return;
      const dx = ev.clientX - lastX;
      const dy = ev.clientY - lastY;
      lastX = ev.clientX;
      lastY = ev.clientY;
      panX += dx / zoom;
      panY += dy / zoom;
      renderLabels();
      requestAnimationFrame(draw);
    });
    canvas.addEventListener("wheel", (ev) => {
      if (!packet) return;
      ev.preventDefault();
      const factor = ev.deltaY < 0 ? 1.1 : 0.9;
      zoom = Math.max(0.1, Math.min(100, zoom * factor));
      renderLabels();
      requestAnimationFrame(draw);
    }, { passive: false });

    fileInput.addEventListener("change", async () => {
      const f = fileInput.files?.[0];
      if (!f) return;
      try {
        const text = await f.text();
        setPacket(toObjFromNDJSON(text));
      } catch (err) {
        statusEl.textContent = `load error: ${err.message}`;
      }
    });

    loadUrlBtn.addEventListener("click", async () => {
      const url = urlInput.value.trim();
      if (!url) return;
      try {
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        const text = await res.text();
        setPacket(toObjFromNDJSON(text));
      } catch (err) {
        statusEl.textContent = `fetch error: ${err.message}`;
      }
    });

    resetViewBtn.addEventListener("click", () => resetView());

    const qs = new URLSearchParams(window.location.search);
    const packetUrl = qs.get("packet");
    if (packetUrl) {
      urlInput.value = packetUrl;
      loadUrlBtn.click();
    }
  </script>
</body>
</html>
